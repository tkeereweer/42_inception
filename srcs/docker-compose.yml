  #   env_file: .env
  #   depends_on:
  #     - wordpress
    
  wordpress:
    build:
      context: requirements/wordpress
    ports:
      - "9000:9000"
    volumes:
      - wordpress-files:/workspace/wordpress
    networks:
      - my-network
    env_file: .env
    depends_on:
      - mariadb

  mariadb:
    build:
      context: requirements/mariadb
    ports:
      - "3306:3306"
    volumes:
      - maria-db:/var/lib/mysql
    networks:
      - my-network
    env_file: .env

volumes:
  wordpress-files:
    name: wordpress-files

  maria-db:
    name: maria-db

networks:
  my-network:
    driver: bridge

